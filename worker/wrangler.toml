name = "buildflow-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
R2_PUBLIC_URL = ""

[[d1_databases]]
binding = "DB"
database_name = "buildflow-db"
database_id = "aca52932-2dfe-4dbd-84fa-f43ff094fef7"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "buildflow-photos"

# Custom domain routing
[[routes]]
pattern = "api.buildworking.com/*"
zone_name = "buildworking.com"
